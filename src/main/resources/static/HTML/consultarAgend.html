<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barbearia — Consulta</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../CSS/style.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">✂</span>
        <span class="logo-text">Barbearia</span>
        <span class="role-badge barbeiro">Cliente</span>
      </div>

      <div class="header-right">
        <a href="../index.html" class="btn btn-primary btn-sm">
          Agendamento 📅
        </a>
      </div>
    </div>
  </header>

  <main class="main">

    <section id="page-cliente">

      <div class="page-header">
        <h1>Consultar Agendamento</h1>
        <p>Digite seu telefone para visualizar seus horários agendados</p>
      </div>

      <form class="form-card" id="form-cliente" novalidate>

        <div class="form-group">
          <label>Telefone</label>
          <input type="text" id="telefone-consulta" placeholder="Digite seu telefone">
        </div>

        <button id="btn-consultar" type="button" class="btn btn-primary btn-full">Consultar</button>
        <br><br>
        <div id="resultado-consulta"></div>
        
      </form>

  </section>
  </main>
      
  <div class="toast" id="toast"></div>       
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal">
      <p id="modal-msg">Confirmar exclusão?</p>
      <div class="modal-actions">
        <button class="btn btn-danger" id="modal-confirm">Excluir</button>
        <button class="btn btn-ghost" id="modal-cancel">Cancelar</button>
      </div>
    </div>
  </div>


    

  <script src="../JavaScript/app.js"></script>
  <script src="../JavaScript/consulta.js"></script>

</body>
</html>
