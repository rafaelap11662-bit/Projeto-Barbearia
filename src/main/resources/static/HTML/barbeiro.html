<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barbearia — Barbeiro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../CSS/style.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">✂</span>
        <span class="logo-text">Barbearia</span>
        <span class="role-badge barbeiro">Barbeiro</span>
      </div>
      <nav class="nav" id="nav">
        <a href="#" class="nav-link active" data-page="minha-agenda">Minha Agenda</a>
        <a href="#" class="nav-link" data-page="agendar">Novo Agendamento</a>
      </nav>
      <div class="header-right">
        <span class="user-name" id="user-name"></span>
        <button class="btn btn-ghost btn-sm" id="btn-logout">Sair</button>
        <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
      </div>
    </div>
  </header>

  <main class="main">

    <!-- MINHA AGENDA -->
    <section class="page active" id="page-minha-agenda">
      <div class="page-header">
        <h1>Minha Agenda</h1>
        <p>Seus agendamentos do dia</p>
      </div>
      <div class="toolbar">
        <input type="date" id="filtro-data" class="input-inline" />
        <button class="btn btn-sm" id="btn-filtrar">Filtrar</button>
        <button class="btn btn-sm" id="btn-refresh-agenda">↻</button>
      </div>
      <div id="lista-minha-agenda" class="card-list"><p class="loading-txt">Carregando...</p></div>
    </section>

    <!-- NOVO AGENDAMENTO -->
    <section class="page" id="page-agendar">
      <div class="page-header">
        <h1>Novo Agendamento</h1>
        <p>Cadastre um cliente no seu horário</p>
      </div>
      <form class="form-card" id="form-agendamento" novalidate>
        <div class="form-group"><label>Nome do cliente</label><input type="text" id="nomeCliente" placeholder="Nome completo" required /></div>
        <div class="form-group"><label>Telefone</label><input type="tel" id="telefoneCliente" placeholder="(00) 00000-0000" required /></div>
        <div class="form-row">
          <div class="form-group"><label>Data</label><input type="date" id="data" required /></div>
          <div class="form-group"><label>Horário</label><select id="horario" required><option value="">Selecione a data primeiro</option></select></div>
        </div>
        <div class="form-group">
          <label>Serviços</label>
          <div class="servicos-grid" id="servicos-grid"><p class="loading-txt">Carregando...</p></div>
        </div>
        <div class="resumo" id="resumo" style="display:none">
          <h3>Resumo</h3>
          <div class="resumo-items" id="resumo-items"></div>
          <div class="resumo-total" id="resumo-total"></div>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Confirmar Agendamento</button>
      </form>
    </section>

  </main>

  <div class="toast" id="toast"></div>
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal">
      <p id="modal-msg">Confirmar exclusão?</p>
      <div class="modal-actions">
        <button class="btn btn-danger" id="modal-confirm">Excluir</button>
        <button class="btn btn-ghost" id="modal-cancel">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="../JavaScript/app.js"></script>
  <script src="../JavaScript/barbeiro.js"></script>
</body>
</html>
