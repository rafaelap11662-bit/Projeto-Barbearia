spring.application.name=barbershop

# Database configuração
# Valores agora vem de variaveis de ambiente (injetadas pelo docker-compose).
# Se a variavel nao existir, usa o valor depois do ":" como padrao (rodar local sem docker).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/barbershop?allowPublicKeyRetrieval=true&useSSL=false}

spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Actuator: expoe endpoint /actuator/health usado no healthcheck do container
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

