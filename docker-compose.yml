services:
  mysql:
    image: mysql:8.0
    command: >
      --performance-schema=OFF
      --innodb-buffer-pool-size=64M
      --max-connections=50
    environment:
      MYSQL_ROOT_PASSWORD: root      
      MYSQL_DATABASE: barbershop     

    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - barbershop-net

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "0.50"     
          memory: 448M    


  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/barbershop?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - barbershop-net
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.50"
          memory: 300M   


  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - barbershop-net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M


networks:
  barbershop-net:
    driver: bridge

volumes:
  mysql-data:
